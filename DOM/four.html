    // METHOD TWO
    function addLanguage(langName){
        const li = document.createElement('li')
        console.log(li)
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("python")
    addLanguage("typescript")
    addLanguage("ruby")

    // EDIT
    const newLang = document.querySelector('li:nth-child(2)')
    // newLang.innerHTML = "Mojo"
    const newLi = document.createElement('li')
    newLi.textContent = "Mojo"
    newLang.replaceWith(newLi)

    // EDIT TWO
    const firstLang = document.querySelector('li:nth-child(4)')
    firstLang.outerHTML = '<li>MOngo</li>'

    // REMOVE
    const lastLang = document.querySelector('li:nth-child(3)')
    lastLang.remove()
